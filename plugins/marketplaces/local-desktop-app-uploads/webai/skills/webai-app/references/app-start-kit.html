  <style>
    :root {
      color-scheme: dark;
      --bg-primary: #181818;
      --bg-secondary: #262626;
      --bg-tertiary: #303030;

      --accent-soft: rgba(37,99,235,0.14);

      --cyan: #22d3ee;

      --orange: #fb923c;
      --orange-soft: rgba(251,146,60,0.12);

      --radius-full: 9999px;
      --font-ui: "SF Pro",-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
      --font-display: "TWK Lausanne",var(--font-ui);
      --font-mono: "SF Mono",ui-monospace,"Cascadia Mono","Consolas",monospace;
      --font-weight-regular: 400;
      --font-weight-medium: 500;
      --font-weight-semibold: 600;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);

      --border-subtle: #d4d4d4;
      --border-light: rgba(0,0,0,0.1);
      --text-primary: #171717;
      --text-secondary: #525252;

      --accent-soft: rgba(37,99,235,0.1);

    }
    * { box-sizing: border-box; margin: 0; }
    *::-webkit-scrollbar { display: none; }

    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { font-family: var(--font-ui); font-size: 14px; line-height: 20px; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    code { font-family: var(--font-mono); font-size: 0.88em; background: var(--surface-soft); padding: 1px 5px; border-radius: 4px; color: var(--accent); }
    .skip-link {
      position: fixed; top: 8px; left: 8px; z-index: 900;
      padding: 8px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border-focus); background: var(--surface-elevated);

    /* ── ONBOARDING ── */
    #onboarding { display: flex; flex-direction: row; height: 100dvh; }
    #onboarding.hidden { display: none; }
    .ob-sidebar { width: 200px; flex-shrink: 0; padding: 48px 20px 24px 28px; border-right: 1px solid var(--border); }
    .ob-steps { display: flex; flex-direction: column; }
    .ob-step { display: flex; align-items: center; gap: 14px; }
    .ob-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid var(--muted); opacity: 0.3; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.4s cubic-bezier(.22,1,.36,1); box-sizing: border-box; }
    .ob-step.active .ob-dot { background: var(--accent); border-color: var(--accent); opacity: 1; box-shadow: 0 0 0 3px rgba(93,144,255,0.15); }
    .ob-step.done .ob-dot { background: var(--green); border-color: var(--green); opacity: 1; color: #fff; }
    .ob-step-label { font-family: var(--font-ui); font-size: 12px; font-weight: 500; color: var(--muted); opacity: 0.4; transition: all 0.3s ease; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ob-step.active .ob-step-label { color: var(--text); opacity: 1; font-weight: 600; }
    .ob-step.done .ob-step-label { opacity: 0.65; }
    .ob-track { width: 1.5px; height: 24px; margin-left: 4.25px; background: var(--border); opacity: 0.35; transition: background 0.4s cubic-bezier(.22,1,.36,1), opacity 0.4s ease; }
    .ob-track.done { background: var(--green); opacity: 0.5; }
    .ob-scroll { flex: 1; overflow-y: auto; display: flex; justify-content: center; min-width: 0; }
    .ob-scroll::-webkit-scrollbar { width: 5px; }
    .ob-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 5px; }
    .ob-page { width: 100%; max-width: 720px; padding: 36px 32px 48px; animation: fadeSlideIn 0.35s var(--ease); }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }
    .ob-page h2 { font-family: var(--font-display); font-size: 24px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 4px; }
    .ob-page .ob-desc { font-size: 14px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
    .ob-meta { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
    .ob-chip { font-size: 10px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
    .ob-chip.time { background: var(--cyan-soft); color: var(--cyan); }
    .ob-chip.diff { background: var(--amber-soft); color: var(--amber); }
    .ob-chip.fac { background: var(--violet-soft); color: var(--violet); }

    .concept { background: transparent; border: none; border-radius: 0; padding: 0 0 0 4px; margin-bottom: 28px; }
    .concept h3 { font-size: 14px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
    .concept h3 .cnum { width: 20px; height: 20px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; }
    .concept p { font-size: 13px; line-height: 1.6; color: var(--muted); }

    /* ── BLOCK ── */
    .tvblock { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 64px; overflow: hidden; }
    .tv-chrome { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid var(--border); height: 38px; }
    .tv-label { font-size: 14px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
    .tv-viewcode {
      font-family: var(--font-ui); font-size: 11px; font-weight: 600; padding: 4px 12px;
      border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface-soft);
      color: var(--muted); cursor: pointer; transition: all var(--t-fast);
    }
    .tv-viewcode:hover { background: var(--accent-soft); border-color: var(--border-focus); color: var(--accent); }
    .tv-viewcode.open { background: var(--accent-soft); border-color: var(--border-focus); color: var(--accent); }
    .tv-viewport { padding: 20px 16px; min-height: 120px; background: var(--bg); }
    .tv-codereveal { display: none; border-top: 1px solid var(--border); animation: tvFade 0.2s var(--ease); }
    .tv-codereveal.open { display: block; }
    @keyframes tvFade { from { opacity: 0; } to { opacity: 1; } }
    .tv-impl-header { padding: 8px 16px; border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); background: rgba(0,0,0,0.06); }
    [data-theme="light"] .tv-impl-header { background: rgba(0,0,0,0.02); }
    .tv-code { padding: 14px 16px; font-family: var(--font-mono); font-size: 12px; line-height: 1.6; color: var(--text); background: rgba(0,0,0,0.15); overflow-x: auto; white-space: pre; min-height: 60px; }
    [data-theme="light"] .tv-code { background: rgba(0,0,0,0.03); }
    .tv-out { padding: 12px 16px; border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 12px; min-height: 28px; }
    .tv-out .tv-out-label { color: var(--muted); white-space: pre; line-height: 1.5; }
    .tv-out .ok { color: var(--green); white-space: pre; }

    .evar {
      color: var(--green); background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      outline: none; cursor: text; padding: 1px 5px; border-radius: 3px;
      transition: background var(--t-fast), border-color var(--t-fast), box-shadow var(--t-fast);
      white-space: pre; display: inline; min-width: 16px;
    }
    .evar:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); }
    .evar:focus { background: rgba(255,255,255,0.09); border-color: var(--muted); box-shadow: 0 0 0 1px var(--muted); }
    [data-theme="light"] .evar { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.12); }
    [data-theme="light"] .evar:hover { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.2); }
    [data-theme="light"] .evar:focus { background: rgba(0,0,0,0.06); border-color: var(--muted); box-shadow: 0 0 0 1px var(--muted); }
    .etoggle {
      color: var(--green); background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      cursor: pointer; padding: 1px 5px; border-radius: 3px; user-select: none;
      transition: background var(--t-fast), border-color var(--t-fast);
      white-space: pre; display: inline;
    }
    .etoggle:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); }
    .etoggle:active { background: rgba(255,255,255,0.1); }
    [data-theme="light"] .etoggle { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.12); }
    [data-theme="light"] .etoggle:hover { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.2); }

    /* ── MOCK UI COMPONENTS ── */
    .mock-shell { border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; font-size: 12px; }
    .mock-bar { background: var(--surface-elevated); padding: 6px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
    .mock-bar .mb-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); opacity: 0.4; }
    .mock-bar .mb-title { font-size: 10px; font-weight: 500; color: var(--muted); margin-left: 4px; }
    .mock-body { padding: 10px 12px; background: var(--surface-soft); }
    .mock-shell.tahoe-liquid {
      border-color: rgba(214, 225, 255, 0.24);
      background: linear-gradient(135deg, rgba(150,170,255,0.16), rgba(120,230,255,0.08));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 16px 38px rgba(0,0,0,0.3);
      backdrop-filter: blur(24px) saturate(1.3);
      -webkit-backdrop-filter: blur(24px) saturate(1.3);
    }
    .mock-shell.tahoe-liquid .mock-bar {
      background: rgba(40,48,72,0.55);
      border-bottom-color: rgba(220,230,255,0.26);
    }
    .mock-shell.tahoe-liquid .mock-body {
      background: rgba(26,34,54,0.38);
    }
    .mock-shell.tahoe-liquid .mock-card {
      background: rgba(20,28,44,0.44);
      border-color: rgba(214,225,255,0.2);
    }
    [data-theme="light"] .mock-shell.tahoe-liquid {
      border-color: rgba(86,116,170,0.24);
      background: linear-gradient(135deg, rgba(238,246,255,0.95), rgba(219,239,255,0.78));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 10px 28px rgba(48,70,110,0.18);
    }
    [data-theme="light"] .mock-shell.tahoe-liquid .mock-bar {
      background: rgba(255,255,255,0.6);
      border-bottom-color: rgba(86,116,170,0.22);
    }
    [data-theme="light"] .mock-shell.tahoe-liquid .mock-body {
      background: rgba(255,255,255,0.44);
    }
    [data-theme="light"] .mock-shell.tahoe-liquid .mock-card {
      background: rgba(255,255,255,0.52);
      border-color: rgba(86,116,170,0.2);
    }
    .mock-line { height: 7px; border-radius: 3px; margin-bottom: 5px; }
    .mock-line.w80 { width: 80%; } .mock-line.w60 { width: 60%; } .mock-line.w40 { width: 40%; }
    .mock-tag { display: inline-block; font-size: 9px; padding: 2px 7px; border-radius: 10px; font-weight: 600; margin-right: 4px; }
    .mock-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; margin-bottom: 6px; }
    .mock-card .mc-name { font-size: 11px; font-weight: 600; color: var(--text); }
    .mock-card .mc-id { font-size: 10px; color: var(--muted); font-family: var(--font-mono); margin-top: 2px; }
    .mock-input { width: 100%; padding: 6px 10px; font-size: 11px; font-family: var(--font-ui); border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface-soft); color: var(--text); }
    .mock-bubble { padding: 8px 12px; border-radius: 12px 12px 12px 4px; font-size: 11px; line-height: 1.4; max-width: 85%; }
    .mock-bubble.user { background: var(--accent); color: #fff; border-radius: 12px 12px 4px 12px; margin-left: auto; }
    .mock-bubble.ai { background: var(--surface-elevated); color: var(--text); border: 1px solid var(--border); }
    .mock-badge { display: inline-block; font-size: 8px; font-weight: 700; padding: 1px 5px; border-radius: 6px; }
    .mock-avatar { width: 18px; height: 18px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; }
    .mock-presence { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

    /* ── CHECKPOINT ── */
    .relation { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 18px; }
    .relation h4 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 10px; }
    .rel-nodes { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .rel-node { padding: 5px 11px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; }
    .rel-node.cur { background: var(--accent-soft); border: 1px solid var(--border-focus); color: var(--accent); }
    .rel-node.avl { background: var(--surface-soft); border: 1px solid var(--border); color: var(--text); }
    .rel-arr { color: var(--muted); font-size: 10px; }
    .checkpoint { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; margin-bottom: 18px; transition: all var(--t-smooth); }
    .checkpoint.all-checked { background: var(--green-soft); border-color: rgba(52,211,153,0.25); }
    .checkpoint h4 { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 10px; transition: color var(--t-fast); }
    .checkpoint.all-checked h4 { color: var(--green); }
    .ck-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; margin-bottom: 4px; line-height: 1.45; }
    .ck-box { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border); flex-shrink: 0; margin-top: 1px; cursor: pointer; transition: all var(--t-fast); display: flex; align-items: center; justify-content: center; font-size: 9px; color: transparent; }
    .ck-box.on { background: var(--green); border-color: var(--green); color: #fff; }
    .ob-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; }
    .nav-btn { font-family: var(--font-ui); font-size: 13px; font-weight: 500; padding: 8px 20px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; transition: all var(--t-fast); display: flex; align-items: center; gap: 8px; }
    .nav-btn:hover { background: var(--accent-soft); border-color: var(--border-focus); color: var(--accent); }
    .nav-btn.pri { background: var(--accent); border-color: var(--accent); color: #fff; }
    .nav-btn.pri:hover { filter: brightness(1.12); }
    .nav-btn.locked { opacity: 0.35; pointer-events: none; }
    .nav-btn.pulse { animation: btnPulse 0.6s var(--ease); }
    .ob-skip {
      font-family: var(--font-ui); font-size: 11px; color: var(--muted); background: none; border: none;
      cursor: pointer; text-decoration: underline; text-decoration-color: transparent;
      padding: 0; margin: 0; transition: color var(--t-fast), text-decoration-color var(--t-fast);
    }
    .ob-skip:hover { color: var(--text); text-decoration-color: var(--muted); }
    @keyframes btnPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(93,144,255,0); } 50% { box-shadow: 0 0 0 8px rgba(93,144,255,0.2); } }

    /* ── PICKER ── */
    #picker { display: none; height: 100dvh; overflow-y: auto; background: var(--bg); }
    #picker.visible { display: block; animation: pickerReveal 0.5s var(--ease); }
    @keyframes pickerReveal { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .picker-inner { max-width: 880px; margin: 0 auto; padding: 64px 32px 80px; }
    .picker-header { text-align: center; margin-bottom: 48px; }
    .picker-header h1 { font-family: var(--font-display); font-size: 32px; font-weight: 600; letter-spacing: -0.03em; line-height: 1.2; }
    .picker-header .picker-sub { font-size: 14px; color: var(--muted); margin-top: 8px; }
    .picker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .pk-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 0; cursor: pointer; transition: all var(--t-fast); overflow: hidden; display: flex; flex-direction: column; }
    .pk-card:hover { border-color: var(--border-focus); transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,0.18); }
    [data-theme="light"] .pk-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
    .pk-preview { height: 120px; background: var(--surface-soft); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; padding: 16px; overflow: hidden; }
    .pk-preview .mock-shell { transform: scale(0.72); transform-origin: center center; pointer-events: none; width: 220px; }
    .pk-body { padding: 16px 18px 18px; flex: 1; display: flex; flex-direction: column; }
    .pk-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .pk-badge { display: inline-block; font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 8px; }
    .pk-badge.recipe { background: var(--green-soft); color: var(--green); }
    .pk-badge.guide { background: var(--amber-soft); color: var(--amber); }
    .pk-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
    .pk-desc { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 10px; flex: 1; }
    .pk-tools { display: flex; flex-wrap: wrap; gap: 4px; }
    .pk-tool { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 6px; background: var(--surface-soft); color: var(--muted); border: 1px solid var(--border); }
    .pk-steps { font-size: 10px; color: var(--muted); margin-top: 8px; }
    .picker-actions { margin-top: 26px; display: flex; justify-content: center; }
    .picker-docs-btn {
      font-family: var(--font-ui); font-size: 12px; font-weight: 600; border: 1px solid var(--border);
      border-radius: var(--radius-md); background: var(--surface); color: var(--text);
      padding: 9px 16px; cursor: pointer; transition: all var(--t-fast);
    }
    .picker-docs-btn:hover { border-color: var(--border-focus); color: var(--accent); background: var(--accent-soft); }

    /* ── WORKSHOP ── */
    #workshop { display: none; height: 100dvh; flex-direction: column; }
    #workshop.visible { display: flex; animation: workshopReveal 0.5s var(--ease); }
    @keyframes workshopReveal { from { opacity: 0; } to { opacity: 1; } }

    /* ── WORKSHOP HEADER BAR ── */
    .ws-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 0 24px; height: 46px; flex-shrink: 0;
      border-bottom: 1px solid var(--border); background: var(--surface);
      backdrop-filter: blur(var(--material-blur));
      -webkit-backdrop-filter: blur(var(--material-blur));
    }
    .ws-topbar-home {
      display: inline-flex; align-items: center; gap: 6px;
      border: none; background: none; color: var(--text); cursor: pointer;
      font-size: 13px; font-weight: 600; padding: 0; font-family: var(--font-ui);
    }
    .ws-topbar-home .wth-icon {
      width: 18px; height: 18px; border-radius: 5px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--surface-soft); border: 1px solid var(--border);
      color: var(--muted); font-size: 11px;
    }
    .ws-topbar-home:hover { color: var(--accent); }
    .ws-topbar-home:hover .wth-icon { border-color: var(--border-focus); color: var(--accent); }
    .ws-topbar-sep { width: 1px; height: 20px; background: var(--border); }
    .ws-topbar-nav { display: flex; gap: 2px; }
    .ws-topbar-tab {
      font-family: var(--font-ui); font-size: 12px; font-weight: 600;
      padding: 6px 14px; border-radius: var(--radius-sm); border: none;
      background: none; color: var(--muted); cursor: pointer; transition: all var(--t-fast);
    }
    .ws-topbar-tab:hover { color: var(--text); background: var(--surface-soft); }
    .ws-topbar-tab.active { color: var(--accent); background: var(--accent-soft); }
    .ws-topbar-spacer { flex: 1; }
    .ws-topbar-search {
      position: relative; width: 200px;
    }
    .ws-topbar-search input {
      width: 100%; padding: 5px 10px 5px 28px; font-family: var(--font-ui); font-size: 11px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--surface-soft); color: var(--text); outline: none; transition: border-color var(--t-fast);
    }
    .ws-topbar-search input:focus { border-color: var(--border-focus); }
    .ws-topbar-search-icon {
      position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
      width: 12px; height: 12px; color: var(--muted); pointer-events: none;
    }

    /* ── CONTENT AREA (sidebar + main grid) ── */
    .ws-content-area { display: flex; flex: 1; overflow: hidden; }
    .ws-content-area.has-sidebar { display: grid; grid-template-columns: 260px minmax(0,1fr); }

    /* ── SIDEBAR (contextual — recipe outline or doc tree) ── */
    .ws-sidebar {
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      backdrop-filter: blur(var(--material-blur));
      -webkit-backdrop-filter: blur(var(--material-blur));
    }
    [data-tauri-tahoe-glass="1"] .ws-content-area.has-sidebar {
      grid-template-columns: 280px minmax(0,1fr);
      gap: 8px;
      padding: 8px;
    }
    [data-tauri-tahoe-glass="1"] .ws-sidebar {
      border-right: 1px solid var(--border);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-lg);
    }
    [data-tauri-tahoe-glass="1"] .ws-main {
      border: 1px solid var(--border);
      border-radius: var(--radius-2xl);
      background: var(--surface);
    }
    .ws-sidebar-head { padding: 14px 14px 10px; flex-shrink: 0; }
    .ws-sidebar-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .ws-sidebar-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .ws-sidebar-badge { display: inline-block; font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 8px; margin-left: 6px; vertical-align: middle; }
    .ws-sidebar-badge.recipe { background: var(--green-soft); color: var(--green); }
    .ws-sidebar-badge.guide { background: var(--amber-soft); color: var(--amber); }

    .ws-sidebar-body { flex: 1; overflow-y: auto; padding: 6px 12px 20px; }
    .ws-sidebar-body::-webkit-scrollbar { width: 4px; }
    .ws-sidebar-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 4px; }

    /* recipe outline items */
    .ws-sidebar-section { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); padding: 10px 8px 5px; }
    .ws-outline-step {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: var(--radius-sm);
      cursor: pointer; transition: background var(--t-fast); margin-bottom: 4px; font-size: 13px;
    }
    .ws-outline-step:hover { background: var(--surface-soft); }
    .ws-outline-step.active { background: var(--accent-soft); color: var(--accent); }
    .ws-outline-num {
      width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600; background: var(--surface-soft); color: var(--muted);
    }
    .ws-outline-step.active .ws-outline-num { background: var(--accent-soft); color: var(--accent); }
    .ws-outline-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ws-outline-tool {
      font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 6px;
      background: var(--surface-soft); border: 1px solid var(--border); color: var(--muted);
      cursor: pointer; transition: all var(--t-fast); margin-bottom: 4px; display: block;
    }
    .ws-outline-tool:hover { border-color: var(--border-focus); color: var(--accent); background: var(--accent-soft); }
    .ws-outline-related {
      display: block; padding: 5px 10px; border-radius: var(--radius-sm);
      font-size: 11px; color: var(--text); cursor: pointer;
      transition: background var(--t-fast); margin-bottom: 1px;
    }
    .ws-outline-related:hover { background: var(--surface-soft); }
    .ws-outline-related .rl-tag { font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 5px; margin-left: 5px; }
    .ws-outline-related .rl-tag.next { background: var(--accent-soft); color: var(--accent); }
    .ws-outline-related .rl-tag.prereq { background: var(--amber-soft); color: var(--amber); }
    .ws-outline-action {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 10px; border-radius: var(--radius-sm); margin-top: 2px;
      font-size: 11px; font-weight: 600; color: var(--accent); cursor: pointer;
      transition: background var(--t-fast); border: 1px solid var(--border);
    }
    .ws-outline-action:hover { background: var(--accent-soft); border-color: var(--border-focus); }
    .ws-outline-action .oa-icon { font-size: 13px; }

    /* docs tree items */
    .ws-tree-domain { margin-top: 10px; }
    .ws-tree-domain-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); padding: 0 8px; margin-bottom: 4px;
    }
    .ws-tree-facade {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px; border-radius: var(--radius-sm);
      cursor: pointer; transition: background var(--t-fast); margin-bottom: 1px;
    }
    .ws-tree-facade:hover { background: var(--surface-soft); }
    .ws-tree-facade.active { background: var(--accent-soft); }
    .ws-tree-facade-name { font-size: 12px; font-weight: 500; font-family: var(--font-mono); }
    .ws-tree-facade.active .ws-tree-facade-name { color: var(--accent); }
    .ws-tree-facade-meta { display: flex; align-items: center; gap: 6px; }
    .ws-tree-facade-count { font-size: 10px; color: var(--muted); font-family: var(--font-mono); }
    .ws-tree-chevron { font-size: 10px; color: var(--muted); transition: transform var(--t-fast); }
    .ws-tree-facade.expanded .ws-tree-chevron { transform: rotate(90deg); }
    .ws-tree-methods { display: none; padding: 0 0 4px 18px; }
    .ws-tree-methods.open { display: block; }
    .ws-tree-method {
      font-size: 11px; font-family: var(--font-mono); padding: 3px 10px;
      border-radius: var(--radius-sm); cursor: pointer; color: var(--muted);
      transition: all var(--t-fast); margin-bottom: 1px;
    }
    .ws-tree-method:hover { background: var(--surface-soft); color: var(--text); }
    .ws-tree-method.active { color: var(--accent); background: var(--accent-soft); }

    /* ── MAIN CONTENT AREA ── */
    .ws-main { overflow-y: auto; display: flex; flex-direction: column; }
    .ws-main::-webkit-scrollbar { width: 5px; }
    .ws-main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 5px; }

    /* recipe gallery grid (state 1 — no sidebar) */
    .ws-gallery { padding: 40px; width: 100%; }
    .ws-gallery h2 { font-family: var(--font-display); font-size: 24px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 8px; }
    .ws-gallery-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .ws-gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

    /* recipe detail */
    .ws-header { padding: 28px 40px 22px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .ws-header .bc { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
    .ws-header h2 { font-family: var(--font-display); font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }
    .ws-header .ws-desc { font-size: 13px; color: var(--muted); margin-top: 5px; line-height: 1.5; max-width: 580px; }
    .ws-tools { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .tool-chip { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; background: var(--surface-soft); border: 1px solid var(--border); color: var(--text); }
    .tool-chip.hl { background: var(--accent-soft); border-color: var(--border-focus); color: var(--accent); }
    .ws-body { padding: 24px 40px; flex: 1; }
    .recipe-step { display: grid; grid-template-columns: 30px minmax(0,1fr); gap: 12px; margin-bottom: 24px; position: relative; }
    .rs-num { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-soft); color: var(--accent); font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; transition: all var(--t-fast); }
    .rs-num.done { background: var(--green-soft); color: var(--green); }
    .rs-body h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .rs-body > p { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
    .ws-body .recipe-step:not(:last-of-type)::after { content: ""; position: absolute; left: 12px; top: 32px; width: 1.5px; height: calc(100% - 6px); background: var(--border); }

    /* docs */
    .doc-header { padding: 28px 40px 22px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .doc-header .bc { font-size: 11px; color: var(--muted); margin-bottom: 5px; text-transform: capitalize; }
    .doc-header h2 { font-family: var(--font-display); font-size: 24px; font-weight: 600; letter-spacing: -0.02em; color: var(--accent); }
    .doc-header .doc-iface { font-size: 11px; font-family: var(--font-mono); color: var(--muted); margin-top: 3px; }
    .doc-header .doc-summary { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.5; max-width: 580px; }
    .doc-header .doc-ts-block { margin-top: 12px; background: rgba(0,0,0,0.15); border-radius: var(--radius-sm); padding: 12px 14px; font-family: var(--font-mono); font-size: 11px; line-height: 1.6; color: var(--muted); overflow-x: auto; white-space: pre; max-height: 220px; }
    [data-theme="light"] .doc-header .doc-ts-block { background: rgba(0,0,0,0.03); }
    .doc-method-list { padding: 24px 40px; flex: 1; }
    .doc-method-list h3 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 12px; }
    .dm-card { background: var(--surface-soft); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 8px; transition: border-color var(--t-fast); scroll-margin-top: 12px; }
    .dm-card:hover { border-color: var(--border-focus); }
    .dm-card.highlighted { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .dm-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .dm-name { font-size: 13px; font-weight: 600; font-family: var(--font-mono); color: var(--accent); margin-bottom: 4px; }
    .dm-sig { font-size: 11px; font-family: var(--font-mono); color: var(--muted); line-height: 1.5; word-break: break-word; }
    .dm-desc { font-size: 12px; color: var(--muted); line-height: 1.45; margin-top: 6px; }
    .dm-optional { display: inline-block; font-size: 8px; font-weight: 700; padding: 1px 4px; border-radius: 3px; background: var(--amber-soft); color: var(--amber); margin-left: 6px; vertical-align: middle; }
    .doc-recipes-section { padding: 0 40px 24px; }
    .doc-recipes-section h4 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 8px; }
    .doc-recipe-link {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: var(--radius-sm); font-size: 12px; color: var(--text);
      cursor: pointer; transition: background var(--t-fast); margin-bottom: 3px;
      border: 1px solid var(--border);
    }
    .doc-recipe-link:hover { background: var(--surface-soft); border-color: var(--border-focus); }
    .doc-recipe-link .crl-badge { font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 6px; background: var(--green-soft); color: var(--green); }

    /* build template */
    .build-template { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-top: 40px; overflow: hidden; }
    .bt-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); }
    .bt-header h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .bt-header p { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .bt-preview { background: var(--bg); padding: 24px; display: flex; align-items: center; justify-content: center; min-height: 200px; }
    .bt-preview .mock-shell { width: 100%; max-width: 480px; }
    .bt-code-toggle { display: flex; align-items: center; justify-content: space-between; padding: 10px 24px; border-top: 1px solid var(--border); }
    .bt-code-toggle span { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .bt-code-body { display: none; border-top: 1px solid var(--border); }
    .bt-code-body.open { display: block; }
    .bt-code-content { padding: 16px 24px; font-family: var(--font-mono); font-size: 12px; line-height: 1.6; color: var(--text); background: rgba(0,0,0,0.15); overflow-x: auto; white-space: pre; }
    [data-theme="light"] .bt-code-content { background: rgba(0,0,0,0.03); }

    /* ── API LAB (side-by-side method view) ── */
    .lab-view { display: flex; flex-direction: column; height: 100%; }
    .lab-bar { display: flex; align-items: center; gap: 12px; padding: 0 20px; height: 38px; flex-shrink: 0; border-bottom: 1px solid var(--border); background: var(--surface-soft); }
    .lab-bar-path { font-size: 11px; font-family: var(--font-mono); color: var(--muted); }
    .lab-bar-path span { color: var(--accent); font-weight: 600; }
    .lab-bar-home { cursor: pointer; color: var(--muted); transition: color var(--t-fast); text-decoration: none; }
    .lab-bar-home:hover { color: var(--accent); }
    .lab-bar-sep { color: var(--muted); margin: 0 4px; opacity: 0.5; }
    .lab-bar-badges { display: flex; gap: 6px; align-items: center; margin-left: auto; }
    .lmc-badge-opt { font-size: 8px; font-weight: 700; padding: 1px 4px; border-radius: 3px; background: var(--amber-soft); color: var(--amber); }
    .lmc-badge-sub { font-size: 8px; font-weight: 700; padding: 1px 4px; border-radius: 3px; background: var(--cyan-soft); color: var(--cyan); }
    .lab-split { display: grid; grid-template-columns: 1fr 320px; flex: 1; overflow: hidden; }
    .lab-preview-pane { display: flex; align-items: center; justify-content: center; padding: 24px; background: var(--bg); overflow: auto; }
    .lab-preview-pane .mock-shell { width: 100%; max-width: 480px; }
    .lab-preview-pane.lab-preview-pane-element { align-items: stretch; justify-content: stretch; padding: 16px; }
    .lab-preview-pane.lab-preview-pane-element .mock-shell { max-width: min(100%, 980px); min-height: 300px; height: 100%; }
    .lab-preview-pane.lab-preview-pane-element .mock-body { height: calc(100% - 30px); display: flex; }
    .lab-element-stack { display: flex; flex-direction: column; gap: 10px; width: 100%; height: 100%; min-height: 220px; }
    .lab-element-stack .mock-card { margin-bottom: 0; }
    .lab-element-stage-card { flex: 1; display: flex; flex-direction: column; min-height: 180px; }
    .lab-element-result-card { flex-shrink: 0; }
    .lab-auto-target-wrap { margin-top: 8px; flex: 1; min-height: 160px; display: flex; }
    .lab-preview-empty { color: var(--muted); font-size: 12px; text-align: center; line-height: 1.6; }
    .lab-preview-empty code { display: block; margin-top: 6px; font-size: 11px; }
    .lab-detail { border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
    .lab-detail::-webkit-scrollbar { width: 4px; }
    .lab-detail::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 4px; }
    .lab-section { border-bottom: 1px solid var(--border); }
    .lab-section:last-child { border-bottom: none; }
    .lab-section-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); padding: 10px 16px 0; }
    .lab-section-params { padding: 8px 16px 12px; }
    .lmc-param-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .lmc-param-label { font-size: 11px; font-family: var(--font-mono); color: var(--accent); min-width: 90px; flex-shrink: 0; }
    .lmc-param-type { font-size: 10px; color: var(--muted); font-family: var(--font-mono); }
    .lmc-param-input { flex: 1; padding: 5px 8px; font-size: 11px; font-family: var(--font-mono); border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface-soft); color: var(--text); outline: none; transition: border-color var(--t-fast); min-width: 0; }
    .lmc-param-input:focus { border-color: var(--border-focus); }
    .lmc-param-toggle { width: 32px; height: 18px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface-soft); cursor: pointer; position: relative; transition: all var(--t-fast); flex-shrink: 0; }
    .lmc-param-toggle.on { background: var(--green); border-color: var(--green); }
    .lmc-param-toggle::after { content: ""; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 50%; background: #fff; transition: transform var(--t-fast); }
    .lmc-param-toggle.on::after { transform: translateX(14px); }
    .lab-run-section { padding: 8px 16px; display: grid; gap: 8px; }
    .lab-run-btn { width: 100%; font-family: var(--font-ui); font-size: 11px; font-weight: 600; padding: 7px 16px; border-radius: var(--radius-sm); border: 1px solid var(--accent); background: var(--accent); color: #fff; cursor: pointer; transition: all var(--t-fast); letter-spacing: 0.02em; }
    .lab-run-btn:hover { filter: brightness(1.12); }
    .lab-run-btn:active { transform: scale(0.98); }
    .lab-run-btn-secondary { border: 1px solid var(--border); background: var(--surface-soft); color: var(--muted); }

      height: 100%;

      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

      margin-top: 6px;
      min-height: 34px;

      align-items: center;
      justify-content: center;
      padding: 6px 8px;

      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;

    }
    .lab-stream-meta {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--font-mono);
      margin-top: 4px;
    }
    .lab-auto-target-detached { position: absolute; left: -10000px; top: -10000px; }

    [data-theme="light"] .lab-section-console.flash { background: rgba(52,211,153,0.08); }
    .lab-console-output { color: var(--green); white-space: pre-wrap; line-height: 1.5; word-break: break-word; }
    .lab-section-sig { padding: 12px 16px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); line-height: 1.5; word-break: break-word; }
    .lab-section-actions { display: flex; gap: 6px; padding: 10px 16px; flex-wrap: wrap; }
    .lab-preview-pane .mock-shell { transition: opacity 0.15s ease; }
    .lab-preview-pane .mock-shell.refreshing { opacity: 0.5; }

    .lmc-action-btn:hover { background: var(--accent-soft); border-color: var(--border-focus); color: var(--accent); }

    .lab-landing-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; text-align: center; line-height: 1.5; max-width: 440px; }
    .lab-landing-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; width: 100%; max-width: 1080px; }
    .lab-landing-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: all var(--t-fast); }
    .lab-landing-card:hover { border-color: var(--border-focus); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .llc-preview { background: var(--bg); padding: 14px 16px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border); pointer-events: none; }
    .llc-preview .mock-shell { width: 100%; transform: scale(0.88); transform-origin: center center; }
    .llc-body { padding: 14px 18px; }
    .llc-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
    .llc-method { font-size: 10px; font-family: var(--font-mono); color: var(--accent); margin-bottom: 6px; }
    .llc-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .lab-landing-hint { font-size: 11px; color: var(--muted); margin-top: 28px; text-align: center; }

    .lab-empty { display: flex; align-items: center; justify-content: center; height: 100%; padding: 40px; color: var(--muted); font-size: 13px; text-align: center; line-height: 1.6; }

    /* open app CTA */
    .open-app-cta { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px 28px; margin-top: 32px; text-align: center; transition: border-color var(--t-fast); }

    [data-theme="light"] .doc-empty-code { background: rgba(0,0,0,0.03); }
    .ws-empty { margin: 24px 40px; padding: 18px 20px; border: 1px dashed var(--border); border-radius: var(--radius-md); background: var(--surface-soft); color: var(--muted); font-size: 13px; line-height: 1.5; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 20px; font-size: 12px; font-weight: 500; color: var(--text); z-index: 500; opacity: 0; pointer-events: none; transition: transform 0.35s var(--ease), opacity 0.35s var(--ease); box-shadow: 0 8px 32px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 8px; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast kbd { background: var(--surface-soft); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; font-size: 10px; font-family: var(--font-mono); }
    .ws-nav-toggle {
      display: none; position: fixed; top: 12px; left: 12px; z-index: 260;
      width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);

      align-items: center; justify-content: center; font-size: 14px;
    }
    .ws-nav-toggle:hover { color: var(--accent); border-color: var(--border-focus); }

    .pk-card:focus-visible, .lab-landing-card:focus-visible, .ws-outline-step:focus-visible, .ws-tree-facade:focus-visible,

    .ws-outline-tool:focus-visible, .nav-btn:focus-visible, .tv-viewcode:focus-visible,
    .copy-btn:focus-visible, .open-app-btn:focus-visible, .picker-docs-btn:focus-visible,
    .pk-card:focus-visible, .ck-box:focus-visible, .ws-topbar-home:focus-visible,
    .ws-topbar-tab:focus-visible, .ob-skip:focus-visible,
    .ws-nav-toggle:focus-visible, .doc-recipe-link:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 2px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1180px) {

      .ws-sidebar {

        transform: translateX(-100%); transition: transform var(--t-smooth);

      }
      #workshop.mobile-nav-open .ws-sidebar { transform: translateX(0); }
      .ws-topbar { padding: 0 12px 0 44px; }
      .ws-topbar-search { display: none; }
      .ws-header { padding: 20px 20px 16px; }
      .ws-body { padding: 18px 20px; }
      .ws-gallery { padding: 20px; }
      .ws-gallery-grid { grid-template-columns: 1fr; }
      .doc-header { padding: 20px 20px 16px; }
      .doc-method-list { padding: 18px 20px; }
      .doc-recipes-section { padding: 0 20px 18px; }
      .lab-bar { padding: 0 12px; }
      .lab-split { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .lab-detail { border-left: none; border-top: 1px solid var(--border); }
      .lab-landing { padding: 32px 20px; }
      .lab-landing-grid { grid-template-columns: 1fr; }

    }

      .picker-inner { padding: 46px 16px 54px; }
      .picker-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }

      var keys = [];
      for (var i = 0; i < DOCS.length; i++) { for (var j = 0; j < DOCS[i].facades.length; j++) { keys.push(DOCS[i].facades[j].key); } }
      return keys;
    }
    /* ─── code rendering ─── */
    function renderCode(code, vars) {
      var h = esc(code);
      if (vars) {
        for (var i = 0; i < vars.length; i++) {
          var v = vars[i];
          var token = esc(v.val);
          if (v.opts) {
            h = h.replace(token, '<span class="etoggle" data-vid="' + v.id + '" data-opts=\'' + esc(JSON.stringify(v.opts)) + '\' data-idx="0">' + token + "</span>");
          } else {
            h = h.replace(token, '<span class="evar" contenteditable="true" data-vid="' + v.id + '" spellcheck="false">' + token + "</span>");
          }
        }
      }
      return h;
    }

    function renderOutput(mockResult, vars, current) {
      var lines = mockResult.split("\n");
      var out = "";
      for (var i = 0; i < lines.length; i++) {
        var line = esc(lines[i]);
        if (vars && current) {
          for (var j = 0; j < vars.length; j++) {
            var v = vars[j];
            if (v.outputToken) { var orig = esc(v.outputToken); var cur = esc(current[v.id] || v.val); line = line.split(orig).join(cur); }
          }
        }
        out += line + "\n";
      }
      return out.replace(/\n$/, "");
    }

    function blockHtml(prefix, idx, block) {
      var key = prefix + "-" + idx;
      var vars = block.vars || [];
      var varMap = {};
      for (var i = 0; i < vars.length; i++) varMap[vars[i].id] = vars[i].val;

      var h = '<div class="tvblock" data-block-key="' + key + '">';
      h += '<div class="tv-chrome"><span class="tv-label">' + esc(block.label || block.title || "Step " + (idx + 1)) + "</span>";
      h += '<div class="tv-actions"><button class="copy-btn" data-copy-key="' + key + '">Copy</button>';
      h += '<button class="tv-viewcode">View Code</button></div></div>';
      h += '<div class="tv-viewport">' + (block.previewHtml || "") + "</div>";
      h += '<div class="tv-codereveal">';
      h += '<div class="tv-impl-header">Implementation</div>';
      h += '<div class="tv-code">' + renderCode(block.code || "", vars) + "</div>";
      h += '<div class="tv-out"><span class="tv-out-label">Console</span><pre class="ok">' + renderOutput(block.mockResult || "", vars, varMap) + "</pre></div>";
      h += "</div></div>";
      return h;
    }

    function findBlock(key) {
      var el = document.querySelector('[data-block-key="' + key + '"]');
      return el || null;
    }

    function propagateVar(wrapper, vid, newVal) {
      var code = wrapper.querySelector(".tv-code");
      var outEl = wrapper.querySelector(".tv-out .ok");
      if (!code || !outEl) return;
      var evars = code.querySelectorAll('[data-vid="' + vid + '"]');
      for (var i = 0; i < evars.length; i++) evars[i].textContent = newVal;

      var prefix = wrapper.getAttribute("data-block-key") || "";
      var parts = prefix.split("-");
      var src = parts[0];
      var bIdx = parseInt(parts[1], 10);
      var pool = src === "lesson" ? LESSONS : WORKSHOPS;
      var entry = pool[bIdx] || pool.find(function (w) { return w.id === src; });
      if (!entry) return;
      var blocks = entry.blocks || entry.steps || [];
      var block = blocks[bIdx] || blocks[0];
      if (!block) return;
      var vars = block.vars || [];
      var current = {};
      for (var i = 0; i < vars.length; i++) {
        var v = vars[i];
        var el = code.querySelector('[data-vid="' + v.id + '"]');
        current[v.id] = el ? el.textContent : v.val;
      }
      outEl.textContent = renderOutput(block.mockResult || "", vars, current);
    }

    function bindBlocks(root) {
      var vcBtns = root.querySelectorAll(".tv-viewcode");
      for (var i = 0; i < vcBtns.length; i++) {
        (function (btn) {
          btn.addEventListener("click", function () {
            var reveal = btn.closest(".tvblock").querySelector(".tv-codereveal");
            if (!reveal) return;
            var open = reveal.classList.toggle("open");
            btn.classList.toggle("open", open);
            btn.textContent = open ? "Hide Code" : "View Code";
          });
        })(vcBtns[i]);
      }

      var copyBtns = root.querySelectorAll(".copy-btn");
      for (var i = 0; i < copyBtns.length; i++) {
        (function (btn) {
          btn.addEventListener("click", function () {
            var block = btn.closest(".tvblock");
            var codeEl = block ? block.querySelector(".tv-code") : null;
            if (codeEl) copyText(codeEl.textContent, btn);
          });
        })(copyBtns[i]);
      }

      var evars = root.querySelectorAll(".evar");
      for (var i = 0; i < evars.length; i++) {
        (function (el) {
          el.addEventListener("input", function () {
            var wrapper = el.closest(".tvblock");
            if (wrapper) propagateVar(wrapper, el.getAttribute("data-vid"), el.textContent);
          });
        })(evars[i]);
      }

      var etoggles = root.querySelectorAll(".etoggle");
      for (var i = 0; i < etoggles.length; i++) {
        (function (el) {
          el.addEventListener("click", function () {
            var opts;
            try { opts = JSON.parse(el.getAttribute("data-opts")); } catch (e) { return; }
            var idx = (parseInt(el.getAttribute("data-idx") || "0", 10) + 1) % opts.length;
            el.setAttribute("data-idx", idx);
            el.textContent = opts[idx];
            var wrapper = el.closest(".tvblock");
            if (wrapper) propagateVar(wrapper, el.getAttribute("data-vid"), opts[idx]);
          });
        })(etoggles[i]);
      }
    }

    /* ─── lesson helpers ─── */
    function lessonComplete(idx) {
      var lesson = LESSONS[idx];
      if (!lesson || !lesson.checks) return false;
      for (var c = 0; c < lesson.checks.length; c++) {
        var key = idx + "-" + c;
        if (!S.checks[key]) return false;
      }
      return true;
    }

    /* ─── onboarding ─── */
    function renderSegBar() {
      var el = $("ob-steps");
      if (!el) return;
      el.innerHTML = "";
      for (var i = 0; i < LESSONS.length; i++) {
        var isDone = i < S.step;
        var isActive = i === S.step;
        var step = document.createElement("div");
        step.className = "ob-step" + (isDone ? " done" : "") + (isActive ? " active" : "");
        if (isActive) step.setAttribute("aria-current", "step");
        var dot = document.createElement("div");
        dot.className = "ob-dot";
        if (isDone) dot.innerHTML = '<svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1.5 4L3.2 5.7L6.5 2.3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        var label = document.createElement("span");
        label.className = "ob-step-label";
        label.textContent = LESSONS[i].title;
        step.appendChild(dot);
        step.appendChild(label);
        el.appendChild(step);
        if (i < LESSONS.length - 1) {
          var track = document.createElement("div");
          track.className = "ob-track" + (isDone ? " done" : "");
          el.appendChild(track);
        }
      }
    }

    function renderOnboarding() {
      var page = $("ob-page");
      if (!page) return;
      var lesson = LESSONS[S.step];
      if (!lesson) { enterPicker(); return; }

      var h = '<h2>' + esc(lesson.title) + "</h2>";
      h += '<p class="ob-desc">' + (lesson.desc || "") + "</p>";
      h += '<div class="ob-meta">';
      h += '<span class="ob-chip time">' + esc(lesson.time || "") + "</span>";
      h += '<span class="ob-chip diff">' + esc(lesson.diff || "") + "</span>";
      if (lesson.tools) h += '<span class="ob-chip fac">' + esc(lesson.tools) + "</span>";
      h += "</div>";

      if (lesson.concepts) {
        for (var c = 0; c < lesson.concepts.length; c++) {
          var con = lesson.concepts[c];
          h += '<div class="concept"><h3><span class="cnum" style="background:var(--' + (con.color || "accent") + '-soft);color:var(--' + (con.color || "accent") + ')">' + con.num + "</span>" + esc(con.title) + "</h3>";
          h += "<p>" + (con.body || "") + "</p></div>";
        }
      }

      if (lesson.blocks) {
        for (var b = 0; b < lesson.blocks.length; b++) {
          h += blockHtml("lesson", b, lesson.blocks[b]);
        }
      }

      if (lesson.relation) {
        h += '<div class="relation"><h4>Where you are</h4><div class="rel-nodes">';
        for (var n = 0; n < lesson.relation.nodes.length; n++) {
          if (n > 0) h += '<span class="rel-arr">&#x2192;</span>';
          h += '<span class="rel-node ' + (n === lesson.relation.current ? "cur" : "avl") + '">' + esc(lesson.relation.nodes[n]) + "</span>";
        }
        h += "</div></div>";
      }

      if (lesson.checks) {
        var allDone = lessonComplete(S.step);
        h += '<div class="checkpoint' + (allDone ? " all-checked" : "") + '"><h4>Checkpoint</h4>';
        for (var c = 0; c < lesson.checks.length; c++) {
          var ck = S.step + "-" + c;
          var on = !!S.checks[ck];
          h += '<div class="ck-item"><span class="ck-box' + (on ? " on" : "") + '" data-ck="' + ck + '" role="checkbox" aria-checked="' + on + '" tabindex="0">&#10003;</span><span>' + esc(lesson.checks[c]) + "</span></div>";
        }
        h += "</div>";
      }

      h += '<div class="ob-footer">';
      if (S.step > 0) h += '<button class="nav-btn" id="ob-prev">&#8592; Back</button>';
      else h += "<span></span>";
      h += '<div style="display:flex;align-items:center;gap:12px">';
      h += '<button class="ob-skip" id="ob-skip">Skip to Docs</button>';
      var nextLocked = !lessonComplete(S.step);
      if (S.step < LESSONS.length - 1) {
        h += '<button class="nav-btn pri' + (nextLocked ? " locked" : "") + '" id="ob-next">Next &#8594;</button>';
      } else {
        h += '<button class="nav-btn pri' + (nextLocked ? " locked" : "") + '" id="ob-finish">Start Building &#8594;</button>';
      }
      h += '</div>';
      h += "</div>";

      page.innerHTML = h;
      renderSegBar();
      bindBlocks(page);

      var ckBoxes = page.querySelectorAll(".ck-box");
      for (var i = 0; i < ckBoxes.length; i++) {
        (function (box) {
          var action = function () {
            var ck = box.getAttribute("data-ck");
            S.checks[ck] = !S.checks[ck];
            saveState();
            renderOnboarding();
          };
          box.addEventListener("click", action);
          bindPressAction(box, action);
        })(ckBoxes[i]);
      }

      var prevBtn = $("ob-prev");
      if (prevBtn) prevBtn.addEventListener("click", function () { S.step = Math.max(0, S.step - 1); saveState(); renderOnboarding(); page.focus(); });

      var nextBtn = $("ob-next");
      if (nextBtn) nextBtn.addEventListener("click", function () {
        if (!lessonComplete(S.step)) return;
        S.step++; saveState(); renderOnboarding(); page.focus();
      });

      var finishBtn = $("ob-finish");
      if (finishBtn) finishBtn.addEventListener("click", function () {
        if (!lessonComplete(S.step)) return;
        S.onboarded = true; saveState(); enterPicker();
      });

      var skipBtn = $("ob-skip");
      if (skipBtn) skipBtn.addEventListener("click", function () { S.onboarded = true; saveState(); enterPicker(); });
    }

    /* ─── picker ─── */
    function enterPicker() {
      enterWorkshop(null, "docs");
    }

    /* ─── workshop entry ─── */
    function enterWorkshop(wsId, mode) {
      $("onboarding").classList.add("hidden");
      $("picker").classList.remove("visible");
      var ws = $("workshop");
      ws.classList.add("visible");
      S.mode = mode || "docs";
      saveState();
      updateTopbarTabs();
      renderWorkshop();
    }

    /* ─── sidebar visibility ─── */
    function updateSidebarVisibility() {
      var sidebar = $("ws-sidebar");
      var area = $("ws-content-area");
      var needsSidebar = false;
      if (S.mode === "docs" || S.mode === "lab") { needsSidebar = true; }

      if (needsSidebar) {
        sidebar.style.display = "";
        area.classList.add("has-sidebar");
      } else {
        sidebar.style.display = "none";
        area.classList.remove("has-sidebar");
      }
    }

    /* ─── topbar tab state ─── */
    function updateTopbarTabs() {
      var tabs = document.querySelectorAll(".ws-topbar-tab");
      for (var i = 0; i < tabs.length; i++) {
        var active = tabs[i].getAttribute("data-mode") === S.mode;
        tabs[i].classList.toggle("active", active);
        tabs[i].setAttribute("aria-selected", active ? "true" : "false");
      }
    }

    var SIDEBAR_SCROLL_BY_MODE = { docs: 0, lab: 0 };
    var ACTIVE_SIDEBAR_MODE = null;

    function captureSidebarScroll() {
      if (!ACTIVE_SIDEBAR_MODE) return;
      var sidebar = $("ws-sidebar");
      if (!sidebar) return;
      var body = sidebar.querySelector(".ws-sidebar-body");
      if (!body) return;
      SIDEBAR_SCROLL_BY_MODE[ACTIVE_SIDEBAR_MODE] = body.scrollTop || 0;
    }

    function setActiveSidebarMode(mode) {
      ACTIVE_SIDEBAR_MODE = mode;
      if (typeof SIDEBAR_SCROLL_BY_MODE[mode] !== "number") {
        SIDEBAR_SCROLL_BY_MODE[mode] = 0;
      }
    }

    function restoreSidebarScroll(mode) {
      var targetTop = Number(SIDEBAR_SCROLL_BY_MODE[mode] || 0);
      var apply = function () {
        var sidebar = $("ws-sidebar");
        if (!sidebar) return;
        var body = sidebar.querySelector(".ws-sidebar-body");
        if (!body) return;
        var maxTop = Math.max(0, body.scrollHeight - body.clientHeight);
        body.scrollTop = targetTop > maxTop ? maxTop : targetTop;
      };
      if (typeof window !== "undefined" && typeof window.requestAnimationFrame === "function") {
        window.requestAnimationFrame(apply);
      } else {
        setTimeout(apply, 0);
      }
    }

    /* ─── DOCS SIDEBAR ─── */
    function renderDocsSidebar(filter) {
      captureSidebarScroll();
      var sidebar = $("ws-sidebar");
      var lf = (filter || "").toLowerCase();
      var h = '<div class="ws-sidebar-head">';
      h += '<div class="ws-sidebar-title">API Reference</div>';
      h += '<div class="ws-sidebar-name">Facades</div>';
      h += "</div>";
      h += '<div class="ws-sidebar-body">';

      for (var d = 0; d < DOCS.length; d++) {
        var domain = DOCS[d];
        var facadeHtml = "";
        var facadeCount = 0;
        for (var f = 0; f < domain.facades.length; f++) {
          var facade = domain.facades[f];
          if (lf && facade.key.toLowerCase().indexOf(lf) === -1 && (facade.summary || "").toLowerCase().indexOf(lf) === -1) {
            var methodMatch = false;
            for (var m = 0; m < facade.methods.length; m++) {
              if (facade.methods[m].name.toLowerCase().indexOf(lf) !== -1) { methodMatch = true; break; }
            }
            if (!methodMatch) continue;
          }
          facadeCount++;
          var isActive = S.activeDoc === facade.key;
          var isExpanded = !!S.expandedDocs[facade.key];
          facadeHtml += '<div class="ws-tree-facade' + (isActive ? " active" : "") + (isExpanded ? " expanded" : "") + '" data-facade="' + facade.key + '" tabindex="0">';
          facadeHtml += '<span class="ws-tree-facade-name">' + esc(facade.key) + "</span>";
          facadeHtml += '<div class="ws-tree-facade-meta"><span class="ws-tree-facade-count">' + facade.methodCount + "</span>";
          facadeHtml += '<span class="ws-tree-chevron">&#x25B6;</span></div></div>';
          facadeHtml += '<div class="ws-tree-methods' + (isExpanded ? " open" : "") + '" data-methods-for="' + facade.key + '">';
          for (var m = 0; m < facade.methods.length; m++) {
            var method = facade.methods[m];
            var displayName = method.name;
            facadeHtml += '<div class="ws-tree-method" data-method-name="' + esc(method.name) + '" data-facade-key="' + facade.key + '" tabindex="0">' + esc(displayName) + "</div>";
          }
          facadeHtml += "</div>";
        }
        if (facadeCount > 0) {
          h += '<div class="ws-tree-domain">';
          h += '<div class="ws-tree-domain-label">' + esc(domain.label) + "</div>";
          h += facadeHtml;
          h += "</div>";
        }
      }
      h += "</div>";
      sidebar.innerHTML = h;
      setActiveSidebarMode("docs");

      var facadeEls = sidebar.querySelectorAll(".ws-tree-facade");
      for (var i = 0; i < facadeEls.length; i++) {
        (function (el) {
          var action = function (e) {
            var key = el.getAttribute("data-facade");
            if (e && (e.target.classList.contains("ws-tree-chevron") || e.target.closest(".ws-tree-facade-meta"))) {
              S.expandedDocs[key] = !S.expandedDocs[key];
              saveState();
              renderDocsSidebar(filter);
              return;
            }
            S.activeDoc = key;
            S.expandedDocs[key] = true;
            saveState();
            renderDocsSidebar(filter);
            renderDocsMain();
          };
          el.addEventListener("click", action);
          bindPressAction(el, action);
        })(facadeEls[i]);
      }

      var methodEls = sidebar.querySelectorAll(".ws-tree-method");
      for (var i = 0; i < methodEls.length; i++) {
        (function (el) {
          var action = function () {
            var facadeKey = el.getAttribute("data-facade-key");
            var methodName = el.getAttribute("data-method-name");
            if (S.activeDoc !== facadeKey) {
              S.activeDoc = facadeKey;
              saveState();
              renderDocsSidebar(filter);
              renderDocsMain();
            }
            setTimeout(function () {
              var main = $("ws-main");
              var cards = main.querySelectorAll(".dm-card");
              for (var c = 0; c < cards.length; c++) {
                if (cards[c].getAttribute("data-method") === methodName) {
                  cards[c].scrollIntoView({ behavior: "smooth", block: "center" });
                  cards[c].classList.add("highlighted");
                  setTimeout(function () { cards[c].classList.remove("highlighted"); }, 1500);
                  break;
                }
              }
            }, 50);
          };
          el.addEventListener("click", action);
          bindPressAction(el, action);
        })(methodEls[i]);
      }
      restoreSidebarScroll("docs");
    }

    /* ─── DOCS MAIN (State 3) ─── */
    function renderDocsMain() {
      var main = $("ws-main");
      var result = findDocFacade(S.activeDoc);
      if (!result) {
        main.innerHTML = '<div class="ws-empty">Select a facade from the sidebar to view its documentation.</div>';
        return;
      }
      var facade = result.facade;
      var domain = result.domain;

      var h = '<div class="doc-header">';
      h += '<div class="bc">' + esc(domain.label) + "</div>";
      h += "<h2>" + esc(facade.key) + "</h2>";
      h += '<div class="doc-iface">sdk.' + esc(facade.key) + " &middot; " + facade.methodCount + " methods</div>";
      h += '<p class="doc-summary">' + esc(facade.summary || "") + "</p>";

      if (facade.methods.length) {
        var tsBlock = "interface " + facade.key.charAt(0).toUpperCase() + facade.key.slice(1) + "Facade {\n";
        for (var m = 0; m < facade.methods.length; m++) {
          var method = facade.methods[m];
          var sig = (method.signature || "").replace(/^\/\*\*[^*]*\*\/\s*/, "");
          tsBlock += "  " + sig + "\n";
        }
        tsBlock += "}";
        h += '<div class="doc-ts-block">' + esc(tsBlock) + "</div>";
      }
      h += "</div>";

      h += '<div class="doc-method-list"><h3>Methods (' + facade.methods.length + ")</h3>";
      if (facade.methods.length === 0) {
        h += '<div class="doc-empty"><p>This facade is a raw passthrough with no typed methods. Access the underlying manager directly via <code>sdk.' + esc(facade.key) + '</code>.</p>';
        h += '<div class="doc-empty-code">var mgr = sdk.' + esc(facade.key) + ";\nconsole.log(mgr);</div></div>";
      } else {
        for (var m = 0; m < facade.methods.length; m++) {
          var method = facade.methods[m];
          var cleanSig = (method.signature || "").replace(/^\/\*\*[^*]*\*\/\s*/, "");
          var sigDisplay = cleanSig.replace(new RegExp("^" + method.name + "\\s*:\\s*"), "");
          h += '<div class="dm-card" data-method="' + esc(method.name) + '">';
          h += '<div class="dm-row"><div>';
          h += '<div class="dm-name">' + esc(method.name);
          if (method.optional) h += '<span class="dm-optional">OPTIONAL</span>';
          h += "</div>";
          h += '<div class="dm-sig">' + esc(sigDisplay) + "</div>";
          h += "</div></div>";
          h += '<div class="dm-desc">' + esc(fallbackMethodDesc(method.name)) + "</div>";
          h += "</div>";
        }
      }
      h += "</div>";

      h += '<div class="open-app-cta"><h4>Try ' + esc(facade.key) + " in the API Lab</h4>";
      h += "<p>Open the interactive SDK launcher to test these methods live.</p>";
      h += '<button class="open-app-btn" data-facade="' + esc(facade.key) + '">Open API Lab</button></div>';

      main.innerHTML = h;

      var openAppBtns = main.querySelectorAll(".open-app-btn");
      for (var i = 0; i < openAppBtns.length; i++) {
        (function (btn) {
          btn.addEventListener("click", function () {
            navigateToLab(btn.getAttribute("data-facade"));
          });
        })(openAppBtns[i]);
      }
    }

    /* ─── WORKSHOP ORCHESTRATOR ─── */
    function renderWorkshop() {
      updateSidebarVisibility();
      var searchVal = ($("ws-search-input") || {}).value || "";

      if (S.mode === "docs") {
        renderDocsSidebar(searchVal);
        renderDocsMain();
      } else if (S.mode === "lab") {
        renderLabSidebar(searchVal);
        renderLabMain();
      }
    }

    function navigateToLab(facadeKey, methodName) {
      S.mode = "lab";
      S.labFacade = facadeKey;
      if (!S.expandedLabFacades) S.expandedLabFacades = {};
      S.expandedLabFacades[facadeKey] = true;
      if (methodName) {
        S.labMethod = methodName;
      } else {
        var r = findDocFacade(facadeKey);
        S.labMethod = (r && r.facade.methods.length > 0) ? r.facade.methods[0].name : null;
      }
      saveState();
      updateTopbarTabs(); updateSidebarVisibility(); renderWorkshop();
    }

    /* ─── API LAB SIDEBAR (State 4) ─── */
    function renderLabSidebar(filter) {
      captureSidebarScroll();
      var sidebar = $("ws-sidebar");
      var lf = (filter || "").toLowerCase();
      var h = '<div class="ws-sidebar-head">';
      h += '<div class="ws-sidebar-title">API Lab</div>';
      h += '<div class="ws-sidebar-name">Playground</div>';
      h += "</div>";
      h += '<div class="ws-sidebar-body">';

      for (var d = 0; d < DOCS.length; d++) {
        var domain = DOCS[d];
        var facadeHtml = "";
        var facadeCount = 0;
        for (var f = 0; f < domain.facades.length; f++) {
          var facade = domain.facades[f];
          if (facade.methods.length === 0) continue;
          if (lf && facade.key.toLowerCase().indexOf(lf) === -1 && (facade.summary || "").toLowerCase().indexOf(lf) === -1) {
            var methodMatch = false;
            for (var m = 0; m < facade.methods.length; m++) {
              if (facade.methods[m].name.toLowerCase().indexOf(lf) !== -1) { methodMatch = true; break; }
            }
            if (!methodMatch) continue;
          }
          facadeCount++;
          var isExpanded = !!S.expandedLabFacades[facade.key];
          var isActive = S.labFacade === facade.key;

    /* ─── API LAB helpers ─── */
    var _labRuntime = {

    function isElementType(typeText) {
      return /\b(HTMLElement|Element|Node)\b/.test(String(typeText || ""));
    }

    function parseParams(sig) {
      var inner = String(sig || "")
        .replace(/^[^(]*\(/, "")
        .replace(/\)\s*=>.*$/, "")
        .replace(/\)\s*:\s*.*$/, "");
      if (!inner || inner.trim() === "") return [];
      var params = [];
      var depth = 0;
      var current = "";
      for (var i = 0; i < inner.length; i++) {
        var ch = inner[i];
        if (ch === "{" || ch === "<" || ch === "[") depth++;
        else if (ch === "}" || ch === ">" || ch === "]") depth--;
        else if (ch === "," && depth === 0) {
          if (current.trim()) params.push(current.trim());
          current = "";
          continue;
        }
        current += ch;
      }
      if (current.trim()) params.push(current.trim());
      return params.map(function (p) {
        var clean = p.replace(/^\s*/, "");
        var nameMatch = clean.match(/^(\w+)(\?)?:\s*(.*)/);
        if (!nameMatch) return { name: clean, type: "unknown", required: true, inputKind: "json" };
        var type = nameMatch[3] || "unknown";
        var inputKind = "json";
        if (/^boolean$/.test(type)) inputKind = "boolean";
        else if (/^number$/.test(type)) inputKind = "number";
        else if (/^string/.test(type)) inputKind = "text";
        else if (/=>/.test(type)) inputKind = "callback";
        else if (isElementType(type)) inputKind = "element";
        return {
          name: nameMatch[1],
          type: type,
          required: !nameMatch[2],
          inputKind: inputKind
        };
      });
    }

      if (methodName.indexOf("is") === 0 || methodName.indexOf("has") === 0) patternClass = "predicate";

      if (mode === "asyncGenerator") patternClass = "stream";

      for (var i = 0; i < params.length; i++) {

        else if (params[i].inputKind === "element") defaultArgs.push({ __labElement: true, name: params[i].name });

        else if (params[i].inputKind === "number") defaultArgs.push(i + 1);

        id: methodId(facadeKey, methodName),
        facadeKey: facadeKey,
        methodName: methodName,
        signature: method.signature || "",
        returnType: returnType,
        mode: mode,

        relatedMethods: [],

    function extractStreamChunkText(chunk) {

      if (chunk.delta && typeof chunk.delta === "object" && typeof chunk.delta.content === "string") {

      if (typeof chunk.content === "string") return chunk.content;
      if (typeof chunk.text === "string") return chunk.text;
      if (typeof chunk.token === "string") return chunk.token;
      var message = chunk.message;
      if (message && typeof message === "object" && typeof message.content === "string") return message.content;
      var choices = Array.isArray(chunk.choices) ? chunk.choices : [];
      if (choices.length > 0 && choices[0] && typeof choices[0] === "object") {

          return first.delta.content;
        }
        if (first.message && typeof first.message === "object" && typeof first.message.content === "string") {
          return first.message.content;

          return {};
        }
        var parsed = tryParseJsonLike(raw);
        if (parsed.ok) return parsed.value;
        var fallbackJson = typeof fallbackDefault !== "undefined" ? cloneLabArgValue(fallbackDefault) : {};
        return {
          __labParseWarning: true,
          message: "Invalid JSON for " + String(param.name || "parameter"),
          raw: String(raw),
          fallback: fallbackJson
        };
      }
      if ((raw === "" || raw === null || typeof raw === "undefined") && typeof fallbackDefault === "string") {
        return fallbackDefault;
      }
      return String(raw);
    }

    function createLabCallback(meta) {
      var id = meta.id;
      return function (event) {
        if (!_labRuntime.eventLogByMethod[id]) _labRuntime.eventLogByMethod[id] = [];
        _labRuntime.eventLogByMethod[id].push(event);
        if (_labRuntime.eventLogByMethod[id].length > 30) {
          _labRuntime.eventLogByMethod[id] = _labRuntime.eventLogByMethod[id].slice(-30);
        }
        if (S.labFacade === meta.facadeKey && S.labMethod === meta.methodName) {
          var preview = $("lab-preview");
          if (preview) preview.innerHTML = renderLabResult(meta, _labRuntime.resultByMethod[id], null);
        }
      };
    }

    function collectLabArgs(root, meta, elementTargets) {
      var args = [];
      var parseWarnings = [];
      var params = meta.params || [];
      for (var i = 0; i < params.length; i++) {
        var p = params[i];
        var fallbackDefault = (meta.defaultArgs && typeof meta.defaultArgs[i] !== "undefined")
          ? cloneLabArgValue(meta.defaultArgs[i])
          : undefined;
        if (p.inputKind === "element") {
          var autoEl = elementTargets && elementTargets[i];
          if (!autoEl && typeof document !== "undefined") {
            autoEl = document.createElement("div");
            autoEl.className = "lab-auto-target lab-auto-target-detached";
          }
          args.push(autoEl || null);
          continue;
        }
        if (p.inputKind === "callback") {
          args.push(createLabCallback(meta));
          continue;
        }
        if (p.inputKind === "boolean") {
          var t = root.querySelector('.lmc-param-toggle[data-pidx="' + i + '"]');
          args.push((t && t.classList.contains("on")) ? true : false);
          continue;
        }
        var input = root.querySelector('.lmc-param-input[data-pidx="' + i + '"]');
        var raw = input ? input.value : "";
        var coerced = coerceArg(raw, p, fallbackDefault);
        if (coerced && coerced.__labParseWarning === true) {
          parseWarnings.push({
            index: i,
            name: p.name || ("arg" + i),
            message: coerced.message || "Invalid JSON"
          });
          args.push(typeof coerced.fallback !== "undefined" ? coerced.fallback : (typeof fallbackDefault !== "undefined" ? fallbackDefault : {}));
          continue;
        }
        args.push(coerced);
      }
      return {
        args: args,
        parseWarnings: parseWarnings
      };
    }

    /* ─── API LAB MAIN (State 4) — landing or single method ─── */

          } else {

            var value = labInputValueFromDefault(defaultVal);
            h += '<input class="lmc-param-input" value="' + esc(value) + '" placeholder="' + esc(placeholder) + '" data-pidx="' + p + '" />';

    function buildLandingCollectionSample(meta) {
      var methodName = String((meta && meta.methodName) || "");
      if (/messages?/i.test(methodName)) {
        return [
          { id: "msg-1", role: "user", content: "Hello from SDK Lab" },
          { id: "msg-2", role: "assistant", content: "Hi! Here is a sample response." }
        ];
      }
      var raw = splitMethodName(methodName).replace(/^List\s+/i, "").trim() || "Item";
      var stem = raw.toLowerCase().replace(/\s+/g, "-") || "item";
      return [
        { id: stem + "-1", name: raw + " 1", status: "active" },
        { id: stem + "-2", name: raw + " 2", status: "idle" }
      ];
    }

    function buildLandingObjectSample(meta) {
      var facade = String((meta && meta.facadeKey) || "facade");
      var methodName = String((meta && meta.methodName) || "method");
      if (meta && meta.patternClass === "stateRead") {
        return { state: "ready", source: facade, updatedAt: "just now" };
      }
      return { id: facade + "-1", status: "ok", method: methodName };
    }

    function buildLandingScalarSample(meta) {
      var valueKind = String((meta && meta.valueKind) || "string");
      if (valueKind === "boolean") return true;
      if (valueKind === "number") return 42;
      if (valueKind === "null") return null;
      if (valueKind === "undefined") return "No return value";
      var methodName = String((meta && meta.methodName) || "");
      if (methodName === "isTahoe") return true;
      if (methodName === "getView") return "launcher";
      if (methodName.indexOf("set") === 0) return "updated";
      return splitMethodName(methodName || "Result");
    }

    function renderLandingMethodPreview(card) {

      var meta = getLabMeta(card.facadeKey, card.methodName);
      if (!meta) {
        return renderMockShell(
          methodLabel,
          '<div class="mock-card"><div class="mc-name">' + esc(card.title || splitMethodName(card.methodName)) + '</div><div class="mc-id">' + esc(card.displayKind || "result") + " preview</div></div>"
        );

      if (getElementParamIndexes(meta).length > 0) {
        return renderMockShell(
          methodLabel,

        );
      }
      var displayKind = (meta.rendering && meta.rendering.displayKind) || card.displayKind || "scalar";
      if (displayKind === "collection") return renderMockShell(methodLabel, renderArrayCollection(buildLandingCollectionSample(meta)));
      if (displayKind === "keyValue") return renderMockShell(methodLabel, renderKeyValueObject(buildLandingObjectSample(meta)));
      if (displayKind === "eventLog") {
        return renderMockShell(

          '<div class="mock-card"><div class="mc-name">Subscription</div><div class="mc-id">Live events appear after Run.</div></div>'

        );

      var shellClass = resolveLabShellClass(meta, scalarValue);

        : (LAB.methods || []).slice(0, 8).map(function (m) {

            };
