    function resolveLabMethodFromRoot(root) {
      var view = root.querySelector(".lab-view");
      if (!view) return null;
      var fk = view.getAttribute("data-facade");
      var mn = view.getAttribute("data-method");
      var sigBody = view.getAttribute("data-sig-body");
      var resultContext = findDocFacade(fk);
      if (!resultContext) return null;
      var method = null;
      for (var i = 0; i < resultContext.facade.methods.length; i++) {
        if (resultContext.facade.methods[i].name === mn) {
          method = resultContext.facade.methods[i];
          break;
        }
      }
      if (!method) return null;
      var meta = getMethodMetaOrFallback(resultContext.facade, method, sigBody);
      return {
        view: view,
        fk: fk,
        mn: mn,
        meta: meta
      };
    }

    function resetLabInputsToDefaults(root, meta) {
      var params = meta && Array.isArray(meta.params) ? meta.params : [];
      for (var i = 0; i < params.length; i++) {
        var param = params[i];
        var defaultVal = (meta.defaultArgs && typeof meta.defaultArgs[i] !== "undefined")
          ? meta.defaultArgs[i]
          : undefined;
        if (param.inputKind === "callback" || param.inputKind === "element") continue;
        if (param.inputKind === "boolean") {
          var toggle = root.querySelector('.lmc-param-toggle[data-pidx="' + i + '"]');
          if (toggle) toggle.classList.toggle("on", defaultVal !== false);
          continue;
        }
        var input = root.querySelector('.lmc-param-input[data-pidx="' + i + '"]');
        if (!input) continue;
        input.value = labInputValueFromDefault(defaultVal);
      }
    }

    function resetActiveLabView(root) {
      resetLabRuntime();
      var resolved = resolveLabMethodFromRoot(root);
      if (!resolved) return;
      resetLabInputsToDefaults(root, resolved.meta);
      var previewEl = root.querySelector("#lab-preview");
      var consoleOut = root.querySelector("#lab-console-out");
      if (previewEl) previewEl.innerHTML = renderLabIdlePreview(resolved.meta);
      if (consoleOut) {
        consoleOut.textContent = "sdk." + resolved.meta.facadeKey + "." + resolved.meta.methodName + "()\n> state reset; click Run to execute";
      }
    }

    async function runLabMethod(root) {
      var resolved = resolveLabMethodFromRoot(root);
      if (!resolved) return;
      var fk = resolved.fk;
      var mn = resolved.mn;
      var meta = resolved.meta;
      var consoleOut = root.querySelector("#lab-console-out");
      var consoleSection = root.querySelector("#lab-console-section");
      var previewEl = root.querySelector("#lab-preview");
      var hasElementParams = getElementParamIndexes(meta).length > 0;
      if (hasElementParams && previewEl) {
        previewEl.innerHTML = renderElementPreview(meta);
      }
      var elementTargets = bindAutoElementArgs(meta, previewEl);
      var collected = collectLabArgs(root, meta, elementTargets);
      var args = collected.args || [];
      var parseWarnings = collected.parseWarnings || [];
      var callText = buildCallString(meta, args);
      var warningPrefix = "";
      if (parseWarnings.length > 0) {
        warningPrefix =
          "INPUT WARNING: " +
          parseWarnings
            .map(function (entry) { return entry.name + ": " + entry.message; })
            .join(" | ") +
          " (using generated default)";
      }
      var sdkRuntime = ensureLabRuntime(false);
      if (!sdkRuntime || !sdkRuntime[fk] || typeof sdkRuntime[fk][mn] !== "function") {
        var missing = "SDK runtime unavailable for " + fk + "." + mn;
        if (consoleOut) consoleOut.textContent = buildCallString(meta, args) + "\n> ERROR: " + missing;
        if (previewEl) {
          if (hasElementParams) updateElementPreviewStatus(previewEl, missing, true);
          else previewEl.innerHTML = renderLabResult(meta, null, missing);
        }
        return;
      }

      if (previewEl) {
        var shell = previewEl.querySelector(".mock-shell");
        if (shell) shell.classList.add("refreshing");
      }

      try {
        destroyLabEffect(meta.id);
        if (meta.mode === "subscription") {
          var key = meta.id;
          var previous = _labRuntime.unsubByMethod[key];
          if (typeof previous === "function") {
            try { previous(); } catch (_error) {}
          }
          var unsub = sdkRuntime[fk][mn].apply(sdkRuntime[fk], args);
          if (typeof unsub === "function") _labRuntime.unsubByMethod[key] = unsub;
          _labRuntime.resultByMethod[key] = "[subscription active]";
          if (previewEl) previewEl.innerHTML = renderLabResult(meta, _labRuntime.resultByMethod[key], null);
          if (consoleOut) {
            consoleOut.textContent =
              callText +
              (warningPrefix ? "\n> " + warningPrefix : "") +
              "\n> " +
              formatConsoleValue("[subscription active]");
          }
        } else if (meta.mode === "asyncGenerator") {
          _labRuntime.streamByMethod[meta.id] = [];
          if (previewEl) previewEl.innerHTML = renderLiveStreamPreview(meta, [], false);
          var stream = sdkRuntime[fk][mn].apply(sdkRuntime[fk], args);
          if (stream && typeof stream[Symbol.asyncIterator] === "function") {
            for await (var chunk of stream) {
              _labRuntime.streamByMethod[meta.id].push(chunk);
              if (previewEl) updateLiveStreamPreview(previewEl, _labRuntime.streamByMethod[meta.id], false);
            }
          }
          _labRuntime.resultByMethod[meta.id] = _labRuntime.streamByMethod[meta.id].slice();
          if (previewEl) updateLiveStreamPreview(previewEl, _labRuntime.streamByMethod[meta.id], true);
          if (consoleOut) {
            consoleOut.textContent =
              callText +
              (warningPrefix ? "\n> " + warningPrefix : "") +
              "\n> " +
              formatConsoleValue(_labRuntime.resultByMethod[meta.id]);
          }
        } else {
          var rawResult = sdkRuntime[fk][mn].apply(sdkRuntime[fk], args);
          var finalResult = rawResult && typeof rawResult.then === "function" ? await rawResult : rawResult;
          _labRuntime.resultByMethod[meta.id] = finalResult;
          if (finalResult && typeof finalResult === "object" && typeof finalResult.destroy === "function") {
            _labRuntime.effectByMethod[meta.id] = finalResult;
          }
          if (previewEl) {
            if (hasElementParams) {
              updateElementPreviewStatus(
                previewEl,
                typeof finalResult === "undefined" ? "mounted (no return value)" : finalResult,
                false
              );
            } else {
              previewEl.innerHTML = renderLabResult(meta, finalResult, null);
            }
          }
          if (consoleOut) {
            consoleOut.textContent =
              callText +
              (warningPrefix ? "\n> " + warningPrefix : "") +
              "\n> " +
              formatConsoleValue(finalResult);
          }
        }
      } catch (error) {
        var message = (error && error.message) ? error.message : String(error);
        if (previewEl) {
          if (hasElementParams) updateElementPreviewStatus(previewEl, message, true);
          else previewEl.innerHTML = renderLabResult(meta, null, message);
        }
        if (consoleOut) {
          consoleOut.textContent =
            callText +
            (warningPrefix ? "\n> " + warningPrefix : "") +
            "\n> ERROR: " +
            message;
        }
      }

      if (consoleSection) {
        consoleSection.classList.add("flash");
        setTimeout(function () { consoleSection.classList.remove("flash"); }, 400);
      }
    }

    function bindLabEvents(root) {
      var labHome = root.querySelector("#lab-home");
      if (labHome) {
        labHome.addEventListener("click", function () {
          disposeLabEffects();
          S.labMethod = null;
          saveState();
          renderLabSidebar();
          renderLabMain();
        });
      }

      var runBtn = root.querySelector("#lab-run");
      if (runBtn) {
        runBtn.addEventListener("click", function () {
          void runLabMethod(root);
        });
      }

      var resetBtn = root.querySelector("#lab-reset");
      if (resetBtn) {
        resetBtn.addEventListener("click", function () {
          resetActiveLabView(root);
        });
      }

      var boolToggles = root.querySelectorAll(".lmc-param-toggle");
      for (var i = 0; i < boolToggles.length; i++) {
        (function (tog) {
          tog.addEventListener("click", function () {
            tog.classList.toggle("on");
            void runLabMethod(root);
          });
        })(boolToggles[i]);
      }

      var inputs = root.querySelectorAll(".lmc-param-input");
      for (var i = 0; i < inputs.length; i++) {
        (function (inp) {
          var debounce = null;
          inp.addEventListener("input", function () {
            clearTimeout(debounce);
            debounce = setTimeout(function () { void runLabMethod(root); }, 250);
          });
          inp.addEventListener("keydown", function (e) {
            if (e.key === "Enter") { e.preventDefault(); clearTimeout(debounce); void runLabMethod(root); }
          });
        })(inputs[i]);
      }

      var copySigs = root.querySelectorAll(".copy-sig");
      for (var i = 0; i < copySigs.length; i++) {
        (function (btn) {
          btn.addEventListener("click", function () {
            copyText(btn.getAttribute("data-sig"), btn);
          });
        })(copySigs[i]);
      }

      var viewDocs = root.querySelectorAll(".view-docs");
      for (var i = 0; i < viewDocs.length; i++) {
        (function (btn) {
          btn.addEventListener("click", function () {
            S.mode = "docs"; S.activeDoc = btn.getAttribute("data-facade"); saveState();
            updateTopbarTabs(); updateSidebarVisibility(); renderWorkshop();
            setTimeout(function () {
              var methodName = btn.getAttribute("data-method");
              var card = document.querySelector('.dm-card[data-method="' + methodName + '"]');
              if (card) { card.classList.add("highlighted"); card.scrollIntoView({ behavior: "smooth", block: "center" }); setTimeout(function () { card.classList.remove("highlighted"); }, 2000); }
            }, 80);
          });
        })(viewDocs[i]);
      }

      var relatedButtons = root.querySelectorAll(".lab-related");
      for (var i = 0; i < relatedButtons.length; i++) {
        (function (btn) {
          btn.addEventListener("click", function () {
            S.labFacade = btn.getAttribute("data-facade");
            S.labMethod = btn.getAttribute("data-method");
            if (!S.expandedLabFacades) S.expandedLabFacades = {};
            S.expandedLabFacades[S.labFacade] = true;
            saveState();
            renderLabSidebar();
            renderLabMain();
          });
        })(relatedButtons[i]);
      }

    }

    /* ─── EVENT WIRING ─── */
    var topbarTabs = document.querySelectorAll(".ws-topbar-tab");
    for (var i = 0; i < topbarTabs.length; i++) {
      (function (tab) {
        tab.addEventListener("click", function () {
          var mode = tab.getAttribute("data-mode");
          if (mode !== "lab") disposeLabEffects();
          S.mode = mode;
          if (mode === "lab") S.labMethod = null;
          saveState();
          updateTopbarTabs();
          renderWorkshop();
        });
      })(topbarTabs[i]);
    }

    var homeBtn = $("ws-home-btn");
    if (homeBtn) {
      homeBtn.addEventListener("click", function () {
        enterPicker();
      });
    }

    var searchInput = $("ws-search-input");
    var _searchDebounce;
    if (searchInput) {
      searchInput.addEventListener("input", function () {
        clearTimeout(_searchDebounce);
        _searchDebounce = setTimeout(function () { renderWorkshop(); }, 200);
      });
    }

    var navToggle = $("ws-nav-toggle");
    if (navToggle) {
      navToggle.addEventListener("click", function () {
        $("workshop").classList.toggle("mobile-nav-open");
      });
    }
    initShellThemeSync();

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        var ws = $("workshop");
        if (ws && ws.classList.contains("mobile-nav-open")) { ws.classList.remove("mobile-nav-open"); return; }
      }
      if ((e.metaKey || e.ctrlKey) && e.key === "k") {
        e.preventDefault();
        var input = $("ws-search-input");
        if (input) input.focus();
      }
    });

    /* ─── BOOT ─── */
    if (S.onboarded) {
      enterWorkshop(null, S.mode);
    } else {
      renderOnboarding();
    }

  })();
  </script>
</body>
</html>
